# Render service spec for the Recap cloud summary proxy.
# https://render.com/docs/blueprint-spec
#
# Deployed on push to main (auto-deploy).

services:
  - type: web
    name: recap-proxy
    runtime: node
    region: oregon
    plan: starter # $7/mo — auto-scales to zero on quiet periods? No; starter
                  # stays warm. Sufficient for v1.
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: GEMINI_API_KEY
        sync: false   # set manually in dashboard; never commit
      - key: INSTALL_TOKEN_PEPPER
        sync: false   # server-only secret for HMAC install tokens; `openssl rand -hex 32`
      - key: RATE_LIMIT_UNAUTH_PER_HOUR
        value: "60"
      - key: RATE_LIMIT_AUTH_PER_HOUR
        value: "600"
      - key: DAILY_BUDGET_USD
        value: "10"
      - key: EST_COST_PER_SUMMARY_USD
        value: "0.005"
    autoDeploy: true
