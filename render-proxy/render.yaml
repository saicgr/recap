# Render service spec for the Recap cloud summary proxy.
# https://render.com/docs/blueprint-spec
#
# Deployed on push to main (auto-deploy).

services:
  - type: web
    name: recap-proxy
    runtime: node
    region: oregon
    plan: starter # $7/mo — auto-scales to zero on quiet periods? No; starter
                  # stays warm. Sufficient for v1.
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: GEMINI_API_KEY
        sync: false   # set manually in dashboard; never commit
      - key: INSTALL_TOKEN_PEPPER
        sync: false   # server-only secret for HMAC install tokens; `openssl rand -hex 32`
      - key: RATE_LIMIT_UNAUTH_PER_HOUR
        value: "60"
      - key: RATE_LIMIT_AUTH_PER_HOUR
        value: "600"
      - key: DAILY_BUDGET_USD
        value: "10"
      # FLOOR for the per-summary circuit-breaker charge (safety backstop, not
      # billing). Raised 0.005 -> 0.02 by the summarizer rebuild: the single-pass
      # prompt asks for up to 8192 output tokens instead of 2048, and output is
      # the expensive half. Must stay >= the code default in gemini.ts/server.ts —
      # a value pinned here OVERRIDES that default, so an un-raised pin would
      # silently reinstate the old under-count.
      #
      # Sizing note: at a $0.02 floor, DAILY_BUDGET_USD=10 trips the global
      # breaker after ~500 summaries/day (it was ~2000 at $0.005). Real Flash Lite
      # cost is nearer $0.001-0.004/summary, so this is deliberately pessimistic.
      # If real usage ever approaches 500/day, raise DAILY_BUDGET_USD — do not
      # lower this floor.
      - key: EST_COST_PER_SUMMARY_USD
        value: "0.02"
    autoDeploy: true
