<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Recap — Live captions</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f0f12;
        --surface: #1a1a20;
        --border: #2a2a32;
        --text: #f5f5f7;
        --muted: #8a8a92;
        --accent: #ff7a45;
      }
      body {
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      h2 { margin: 0 0 12px 0; font-size: 14px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
      .caption {
        margin-bottom: 12px;
        padding: 10px 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 15px;
        line-height: 1.5;
      }
      .caption .ts {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 4px;
        font-variant-numeric: tabular-nums;
      }
      .empty {
        color: var(--muted);
        font-size: 13px;
        margin-top: 40px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h2>Live captions</h2>
    <div id="captions"></div>
    <div id="empty" class="empty">Not recording. Open the popup to start.</div>
    <script src="sidepanel.js"></script>
  </body>
</html>
