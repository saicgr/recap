<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Recap</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f0f12;
        --surface: #1a1a20;
        --border: #2a2a32;
        --text: #f5f5f7;
        --muted: #8a8a92;
        --accent: #ff7a45;
        --danger: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 16px;
        width: 280px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
      }
      h1 { margin: 0 0 12px 0; font-size: 15px; font-weight: 600; }
      button {
        width: 100%;
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      button:hover { opacity: 0.85; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      .primary { background: var(--accent); color: white; }
      .danger  { background: var(--danger); color: white; }
      .ghost   { background: transparent; color: var(--muted); padding: 6px; }
      .status {
        margin: 12px 0;
        padding: 10px 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 12px;
        color: var(--muted);
      }
      .status.live { color: var(--accent); }
      .row { display: flex; gap: 8px; margin-top: 8px; }
      a { color: var(--accent); text-decoration: none; }
    </style>
  </head>
  <body>
    <h1>Recap</h1>
    <div class="status" id="status">Not recording</div>
    <button class="primary" id="toggle">Record this tab</button>
    <div class="row">
      <button class="ghost" id="openSidePanel">Open captions panel</button>
    </div>
    <div class="row">
      <button class="ghost" id="openSettings">Settings</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
